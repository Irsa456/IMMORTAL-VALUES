<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
background:#2a1465;
font-family:'Orbitron',sans-serif;
color:white;
}

h1{
text-align:center;
margin-top:40px;
color:#c084fc;
}

.calc-card{
max-width:900px;
margin:40px auto;
padding:30px;
border-radius:18px;
background:linear-gradient(145deg,#1e1b4b,#0f172a);
border:2px solid #a855f7;
box-shadow:0 0 15px #a855f7;
transition:0.4s;
}
  .slot-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:15px;
}

.slot{
height:90px;
border:2px dashed #a855f7;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:700;
color:#c084fc;
cursor:pointer;
background:rgba(255,255,255,0.03);
transition:0.3s;
}

.slot:hover{
background:rgba(168,85,247,0.15);
transform:scale(1.03);
box-shadow:0 0 12px #a855f7;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.side h2{
text-align:center;
color:#c084fc;
}

button{
display:block;
margin:25px auto;
padding:12px 28px;
background:#a855f7;
border:none;
border-radius:10px;
color:white;
font-weight:700;
cursor:pointer;
}

button:hover{
background:#9333ea;
}

#result{
text-align:center;
font-size:24px;
margin-top:20px;
}

#diff{
text-align:center;
margin-top:10px;
font-size:18px;
color:#ddd;
}

.win{
border-color:#22c55e;
box-shadow:0 0 18px #22c55e;
background:linear-gradient(145deg,#052e16,#0f172a);
}

.loss{
border-color:#ef4444;
box-shadow:0 0 18px #ef4444;
background:linear-gradient(145deg,#450a0a,#0f172a);
}

.smallloss{
border-color:orange;
box-shadow:0 0 18px orange;
background:linear-gradient(145deg,#451a03,#0f172a);
}

.fair{
border-color:white;
box-shadow:0 0 18px white;
background:linear-gradient(145deg,#1f2937,#0f172a);
}

@media(max-width:700px){
.grid{
grid-template-columns:1fr;
}

 function renderPicker(){

const grid = document.getElementById("pickerGrid");

const search =
document.getElementById("searchBar")
.value
.toLowerCase();

grid.innerHTML = "";

fruits
.filter(fruit =>
currentFilter === "All"
|| fruit.type === currentFilter
)
  .filter(fruit =>
fruit.name.toLowerCase().includes(search)
)
.forEach(fruit=>{

grid.innerHTML += `

<div class="pick-card ${fruit.category}"
onclick="chooseFruit(
'${fruit.name}',
${fruit.value},
'${fruit.img}',
${fruit.demand}
)">

<img src="${fruit.img}">
<h3>${fruit.name}</h3>

${fruit.perm ? `

<div class="perm-options">

<button onclick="
event.stopPropagation();
chooseFruit(
'${fruit.name}',
${fruit.value},
'${fruit.img}',
${fruit.demand}
)
">
Normal
</button>

<button onclick="
event.stopPropagation();
chooseFruit(
'Perm ${fruit.name}',
${fruit.perm},
'${fruit.img}',
${fruit.demand}
)
">
Perm
</button>

</div>

` : ''}

</div>

`;

});

}

  function filterItems(type){

currentFilter = type;

renderPicker();

}
  
  function toggleSlot(slot){

if(slot.dataset.value){

slot.innerHTML = "+";

slot.removeAttribute("data-value");
slot.removeAttribute("data-demand");

updateTotals();
checkTrade();
}
else{
openPicker(slot);
}

}

function openPicker(slot){

activeSlot = slot;

renderPicker();

document.getElementById("picker").style.display="flex";

}
  function closePicker(){

document.getElementById("picker").style.display="none";

}

function chooseFruit(name,val,img,demand){

activeSlot.innerHTML =
'<img src="'+img+'" class="slot-img">';

activeSlot.setAttribute("data-value",val);
activeSlot.setAttribute("data-demand",demand);

closePicker();
  
  updateTotals();
  checkTrade();
}

  function updateTotals(){

let yourValue=0;
let yourDemand=0;
let theirValue=0;
let theirDemand=0;

document.querySelectorAll(".side")[0]
.querySelectorAll(".slot")
.forEach(slot=>{
yourValue += Number(slot.dataset.value || 0);
yourDemand += Number(slot.dataset.demand || 0);
});

document.querySelectorAll(".side")[1]
.querySelectorAll(".slot")
.forEach(slot=>{
theirValue += Number(slot.dataset.value || 0);
theirDemand += Number(slot.dataset.demand || 0);
});

document.getElementById("yourTotals").innerHTML =
"Total Value: "+yourValue.toLocaleString()+"<br>Total Demand: "+yourDemand;

document.getElementById("theirTotals").innerHTML =
"Total Value: "+theirValue.toLocaleString()+"<br>Total Demand: "+theirDemand;

}
  
function checkTrade(){

let yourTotal=0;
let theirTotal=0;

document.querySelectorAll(".side")[0]
.querySelectorAll(".slot")
.forEach(slot=>{
yourTotal += Number(slot.dataset.value || 0);
});

document.querySelectorAll(".side")[1]
.querySelectorAll(".slot")
.forEach(slot=>{
theirTotal += Number(slot.dataset.value || 0);
});
  
let diff = theirTotal - yourTotal;

let card = document.getElementById("card");
card.className="calc-card";

if(diff > 0){
card.classList.add("win");
document.getElementById("result").innerHTML="🟢 W Trade";
}
else if(diff == 0){
card.classList.add("fair");
document.getElementById("result").innerHTML="⚪ Fair Trade";
}
else{

if(yourTotal > 0 && Math.abs(diff)/yourTotal <= 0.10){
card.classList.add("smallloss");
document.getElementById("result").innerHTML="🟠 Small L";
}
else{
card.classList.add("loss");
document.getElementById("result").innerHTML="🔴 L Trade";
}

}

document.getElementById("diff").innerHTML =
"Value Difference: "+Math.abs(diff).toLocaleString();

}
  
</script>

</body>
</html>
